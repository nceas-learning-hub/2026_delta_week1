project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"

filters:
- nceas-learning-hub/theme
- quarto-ext/fontawesome
exercises: ### for custom theme callouts
  number: false ### see https://cambiotraining.github.io/quarto-course-template/materials/02-content_guidelines.html but does not work
editor: source
execute:
  freeze: auto

format:
  theme-html:
    code-annotations: hover ### tool tip style footnotes for code

website:
  title: "2026 Delta Synthesis Working Groups week 1 (April 2026)"
  reader-mode: false
  repo-url: https://github.com/nceas-learning-hub/2026_delta_week1

  favicon: _extensions/nceas-learning-hub/theme/banner/logo_delta_favicon.png # learning hub logo on browser tab

  bread-crumbs: false
  navbar:
    right:
      - text: "Instructors"
        menu:
          - text: "Nick Lyon"
            href: https://njlyon0.github.io/
          - text: "Casey O'Hara"
            href: https://www.oharascience.com/
          - text: "Jim Regetz"
            href: https://github.com/regetz/
      - icon: github
        href: https://github.com/nceas-learning-hub/2026_delta_week1
        aria-label: GitHub

  sidebar:
    title: "Training Materials"
    style: "floating"
    search: true
    tools:
      - icon: house-door-fill
        href: https://www.nceas.ucsb.edu/learning-hub
      - icon: twitter
        href: https://twitter.com/ucsb_nceas
      - icon: github
        href: https://github.com/nceas-learning-hub/2026_delta_week1
    contents:
      - index.qmd      ### Landing page
      - s00_prep.qmd   ### Pre-workshop prep
      - s00_groups.qmd ### additional preface page
      - text: "Project Milestones"
        href: s00_benchmarks.qmd
      # START SESSIONS
      - section: "Day 1"
        contents:
        - s01_positron_setup.qmd
        - s02_git_setup.qmd
        - s03_activity_thinking_preferences.qmd
        - s04_synthesis_crafting_project_ideas.qmd
      - section: "Day 2"
        contents:
        - s05_lecture_proj_mgmt_team_science.qmd
        - s06_lecture_data_mgmt_discovery.qmd
        - s07_github_introduction.qmd
        - s08_synthesis_logic_models.qmd
      - section: "Day 3"
        contents:
        - s09_activity_reproducibility_lego.qmd
        - s10_r_quarto_literate_analysis.qmd
      - section: "Day 4"
        contents:
        - s11_lecture_tidy_data.qmd
        - s12_r_tidyverse_clean_wrangle.qmd
        - s13_r_practice_clean_wrangle_visualize.qmd
      - section: "Day 5"
        contents:
        - s14_github_project_management.qmd
        - s15_synthesis_next_steps.qmd
      - section: "Additional Resources"
        contents:
        - text: "Intro to R Programming"
          href: s16_r_programming_introduction.qmd
      # END SESSIONS

  page-footer:
    center: "Copyright \u00a9 2026, NCEAS"
    ### NCEAS main website footer:
    # center: "\u00a9 The Regents of the University of California, All Rights Reserved"
    # could also include license info?


